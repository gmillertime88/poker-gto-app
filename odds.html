<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MillerTime Poker Odds</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="theme.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="card">
        <div class="top-nav">
          <div class="home-brand">
            <a class="home-logo-link" href="index.html" aria-label="Go to Main Menu">
              <img class="home-logo-icon" src="assets/millertime-poker-logo.png" alt="MillerTime Poker" />
            </a>
          </div>
          <h1 class="page-title">MillerTime Poker Odds</h1>
          <details class="hamburger-menu">
            <summary class="hamburger-trigger" aria-label="Open menu">
              <span></span>
              <span></span>
              <span></span>
            </summary>
            <div class="hamburger-panel">
              <div class="theme-control menu-theme-control">
                <span class="theme-label">Dark</span>
                <label class="theme-switch" for="theme-toggle-odds" aria-label="Toggle light mode">
                  <input id="theme-toggle-odds" type="checkbox" data-theme-toggle />
                  <span class="theme-slider"></span>
                </label>
                <span class="theme-label">Light</span>
              </div>
              <a class="nav-link menu-nav-link" href="ranges.html">Go to Ranges</a>
              <a class="nav-link menu-nav-link" href="odds.html" aria-current="page">Go to Odds</a>
              <a class="nav-link menu-nav-link" href="training.html">Go to Training</a>
            </div>
          </details>
        </div>

        <div class="field-group">
          <h2>Players <span class="required-asterisk" aria-hidden="true">*</span></h2>
          <div class="players-start-row">
            <div id="odds-players-grid" class="button-grid players-grid odds-players-grid"></div>
            <button id="reset-odds-btn" class="small-reset-btn" type="button">Reset</button>
          </div>
        </div>

        <div class="field-group">
          <h2>Player Hands</h2>
          <div id="player-rows" class="player-rows"></div>
        </div>

        <div class="field-group">
          <h2>Community Cards</h2>
          <div id="board-grid" class="board-grid"></div>
        </div>

        <section class="result" aria-live="polite">
          <button id="calculate-odds-btn" class="calculate-odds-panel result-calc-btn" type="button">Calculate</button>
          <div class="result-row odds-summary-row">
            <span class="label summary-label">Status: <span id="odds-status" class="value odds-status-value pending">-</span></span>
          </div>
          <div class="result-row odds-summary-row">
            <span class="label summary-label">Possible Combinations: <span id="boards-evaluated" class="value">-</span></span>
          </div>
          <div id="odds-results" class="odds-results"></div>
        </section>

        <div class="build-tag-wrap">
          <span id="build-tag" class="build-tag">Build -</span>
        </div>
      </section>
    </main>

    <script src="odds.js"></script>
  </body>
</html>
