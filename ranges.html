<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Millertime Poker GTO-Ranges</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="theme.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="card">
        <div class="top-nav">
          <div class="home-brand">
            <a class="home-logo-link" href="index.html" aria-label="Go to Main Menu">
              <img class="home-logo-icon" src="assets/millertime-poker-logo.png" alt="MillerTime Poker" />
            </a>
          </div>
          <h1 class="page-title">MillerTime Poker GTO-Ranges</h1>
          <details class="hamburger-menu">
            <summary class="hamburger-trigger" aria-label="Open menu">
              <span></span>
              <span></span>
              <span></span>
            </summary>
            <div class="hamburger-panel">
              <div class="theme-control menu-theme-control">
                <span class="theme-label">Dark</span>
                <label class="theme-switch" for="theme-toggle-ranges" aria-label="Toggle light mode">
                  <input id="theme-toggle-ranges" type="checkbox" data-theme-toggle />
                  <span class="theme-slider"></span>
                </label>
                <span class="theme-label">Light</span>
              </div>
              <a class="nav-link menu-nav-link" href="ranges.html" aria-current="page">Go to Ranges</a>
              <a class="nav-link menu-nav-link" href="odds.html">Go to Odds</a>
              <a class="nav-link menu-nav-link" href="training.html">Go to Training</a>
            </div>
          </details>
        </div>

        <p class="subtitle">Select your position and hand to get the recommended first-in action.</p>

        <details id="ranges-settings-panel" class="training-settings">
          <summary class="training-settings-summary">Range Settings</summary>

          <div class="field-group">
            <h2>Players <span class="required-asterisk" aria-hidden="true">*</span></h2>
            <div id="players-grid" class="button-grid players-grid scroll-selector ranges-scroll-selector"></div>
          </div>

          <div class="field-group">
            <h2>Table Temperature <span class="required-asterisk" aria-hidden="true">*</span></h2>
            <div id="temperature-grid" class="button-grid temperature-grid scroll-selector ranges-scroll-selector"></div>
          </div>

          <div class="field-group">
            <h2>Position <span class="required-asterisk" aria-hidden="true">*</span></h2>
            <div id="position-grid" class="button-grid"></div>
          </div>

          <div class="field-group">
            <h2>Card 1 <span class="required-asterisk" aria-hidden="true">*</span></h2>
            <div id="card1-grid" class="button-grid"></div>
          </div>

          <div class="field-group">
            <h2>Card 2 <span class="required-asterisk" aria-hidden="true">*</span></h2>
            <div id="card2-grid" class="button-grid"></div>
          </div>

          <div class="field-group">
            <h2>Suiting <span class="required-asterisk" aria-hidden="true">*</span></h2>
            <div id="suited-grid" class="button-grid suiting-grid"></div>
          </div>
        </details>

        <section class="result range-result" id="result-box" aria-live="polite">
          <div class="result-row odds-summary-row">
            <span class="label summary-label">Hand: <span id="hand-value" class="value">-</span></span>
          </div>
          <button id="action-button" class="select-btn range-action-btn" type="button" hidden></button>
          <div class="result-row odds-summary-row">
            <span class="label summary-label">Size: <span id="size-value" class="value">-</span></span>
          </div>
        </section>

        <p class="required-note">* Required Inputs</p>

        <div class="build-tag-wrap">
          <span id="build-tag" class="build-tag">Build -</span>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
